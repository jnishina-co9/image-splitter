<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像分割アプリ - Image Splitter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            text-align: center;
            background-color: #FFFFFF;
            color: #1c1c1c;
            margin: 0;
            padding: 20px 10px;
            line-height: 1.6;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .content-section {
            background: #FFFFFF;
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
        }

        .step {
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid #1c1c1c;
            padding-bottom: 5px;
        }

        input[type="file"],
        input[type="number"] {
            font-size: 16px;
            padding: 12px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            border-radius: 0;
            background: #f9f9f9;
        }

        input[type="number"] {
            width: 70px;
            display: inline-block;
            margin-right: 10px;
        }

        /* ボタン共通スタイル */
        .action-btn,
        .dl-btn {
            background-color: #1c1c1c;
            /* 通常時：黒 */
            color: #FFFFFF;
            /* 文字色：白 */
            border: 1px solid #1c1c1c;
            cursor: pointer;
            font-weight: 700;
            border-radius: 0;
            transition: all 0.2s ease;
            display: block;
            width: 100%;
        }

        .action-btn {
            font-size: 18px;
            padding: 15px;
            margin-top: 20px;
        }

        .zip-btn {
            margin-top: 20px;
        }

        /* リセットボタン（アウトラインスタイル） */
        .reset-btn {
            background-color: #FFFFFF;
            color: #1c1c1c;
            border: 1px solid #1c1c1c;
        }

        .reset-btn:hover {
            background-color: #1c1c1c;
            color: #FFFFFF;
        }

        .dl-btn {
            padding: 12px 0;
            font-size: 14px;
        }

        /* ホバー時の設定（モノトーン反転） */
        .action-btn:hover,
        .dl-btn:hover {
            background-color: #e3e3e3;
            /* ホバー時：ライトグレー */
            border-color: #e3e3e3;
            color: #1c1c1c;
            /* 文字色を黒にして視認性を確保 */
        }

        .result-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            margin-top: 20px;
        }

        .result-item {
            width: calc(20% - 8px);
            border: 1px solid #eee;
            padding: 8px;
            text-align: center;
            background: #FFFFFF;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .result-item img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .result-item {
                width: calc(33.33% - 7px);
            }

            .dl-btn {
                padding: 10px 0;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <h1>画像を分割する</h1>

    <div class="content-section">
        <div class="step">1. 画像を選択</div>
        <input type="file" id="splitInput" accept="image/*">

        <div class="step">2. 分割数（タテ × ヨコ）</div>
        <div style="margin-bottom: 10px;">
            タテ: <input type="number" id="rows" value="2" min="1">
            ヨコ: <input type="number" id="cols" value="2" min="1">
        </div>

        <button id="splitBtn" class="action-btn" onclick="handleSplit()">分割する</button>

        <div id="splitResults" class="result-container"></div>

        <button id="splitZipBtn" class="action-btn zip-btn" style="display: none;"
            onclick="downloadZip()">まとめてZIP保存</button>

        <button id="resetBtn" class="action-btn reset-btn" onclick="handleReset()">リセットする</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        let splitBlobs = [];

        function getFormattedDate() {
            const now = new Date();
            const pad = (num) => String(num).padStart(2, '0');
            return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        }

        function handleSplit() {
            const file = document.getElementById('splitInput').files[0];
            const r = parseInt(document.getElementById('rows').value);
            const c = parseInt(document.getElementById('cols').value);
            const results = document.getElementById('splitResults');

            if (!file || r < 1 || c < 1) {
                results.innerHTML = '<p style="color:red; font-size:14px;">入力エラーがあります。</p>';
                return;
            }

            results.innerHTML = '';
            splitBlobs = [];
            document.getElementById('splitZipBtn').style.display = 'none';

            const img = new Image();
            img.onload = () => {
                const w = img.width / c;
                const h = img.height / r;
                let count = 0;
                const dateStr = getFormattedDate();

                for (let y = 0; y < r; y++) {
                    for (let x = 0; x < c; x++) {
                        const cvs = document.createElement('canvas');
                        cvs.width = w;
                        cvs.height = h;
                        cvs.getContext('2d').drawImage(img, x * w, y * h, w, h, 0, 0, w, h);

                        cvs.toBlob(blob => {
                            count++;
                            const url = URL.createObjectURL(blob);
                            const name = `${dateStr}_${y + 1}-${x + 1}.png`;
                            splitBlobs.push({ blob: blob, name: name });

                            const item = document.createElement('div');
                            item.className = 'result-item';

                            const preview = document.createElement('img');
                            preview.src = url;
                            item.appendChild(preview);

                            const btn = document.createElement('button');
                            btn.className = 'dl-btn';
                            btn.textContent = '保存';
                            btn.addEventListener('click', () => {
                                saveAs(blob, name);
                            });
                            item.appendChild(btn);

                            results.appendChild(item);

                            if (count === r * c) {
                                document.getElementById('splitZipBtn').style.display = 'block';
                            }
                        }, 'image/png');
                    }
                }
            };
            img.src = URL.createObjectURL(file);
        }

        function downloadZip() {
            if (splitBlobs.length === 0) return;
            const zip = new JSZip();
            const dateStr = getFormattedDate();
            splitBlobs.forEach(b => zip.file(b.name, b.blob));
            zip.generateAsync({ type: "blob" }).then(content => {
                saveAs(content, `split_images_${dateStr}.zip`);
            });
        }

        function handleReset() {
            // ファイル選択をクリア
            document.getElementById('splitInput').value = '';
            // 分割数を初期値に戻す
            document.getElementById('rows').value = 2;
            document.getElementById('cols').value = 2;
            // 分割結果をクリア
            document.getElementById('splitResults').innerHTML = '';
            // ZIP保存ボタンを非表示
            document.getElementById('splitZipBtn').style.display = 'none';
            // Blobデータのメモリ解放
            splitBlobs.forEach(b => URL.revokeObjectURL(b.blob));
            splitBlobs = [];
        }
    </script>
</body>

</html>
